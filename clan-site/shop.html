<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYRIA FOUR | الشحن</title>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div id="loadingScreen">
  <div class="loader-content">
    <img src="/images/clan-logo.png" alt="SYRIA FOUR" class="loader-logo" id="loaderLogo">
    <h2 class="loader-title">SYRIA FOUR</h2>
    <div class="loader-bar">
      <div class="loader-progress" id="loaderProgress"></div>
    </div>
    <p class="loader-text">جاري التحميل...</p>
  </div>
</div>

<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="/" class="nav-logo">
      <img src="/images/clan-logo.png" alt="SYRIA FOUR"> SYRIA FOUR
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="القائمة">
      <i class="fas fa-bars"></i>
    </button>
    <div class="nav-menu" id="navMenu">
      <a href="/" class="nav-link">الرئيسية</a>
      <a href="/leaders" class="nav-link">القيادات</a>
      <a href="/members" class="nav-link">الأعضاء</a>
      <a href="/tournaments" class="nav-link">البطولات</a>
      <a href="/shop" class="nav-link active">الشحن</a>
      <a href="/events" class="nav-link">الفعاليات</a>
      <a href="/gallery" class="nav-link">المعرض</a>
      <a href="/rules" class="nav-link">الشروط</a>
      <a href="/support" class="nav-link">الدعم</a>
      <a href="/admin" class="nav-link">الإدارة</a>
    </div>
  </div>
</nav>

<div id="siteBanner" class="site-banner" style="display:none"></div>

<div class="page-header">
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <h1>شحن الجواهر</h1>
  <p>اطلب شحن جواهر فري فاير بأفضل الأسعار</p>
</div>

<section class="section">
  <div class="container">
    <div class="shop-grid" id="shopGrid"></div>
  </div>
</section>

<div class="container">
  <div class="shop-form-container">
    <h3>طلب شحن</h3>
    <form id="shopForm" class="shop-form">
      <div class="form-group">
        <label for="playerName">اسمك في اللعبة</label>
        <input type="text" id="playerName" name="playerName" required placeholder="أدخل اسمك في اللعبة">
      </div>
      <div class="form-group">
        <label for="playerId">الرمز ID</label>
        <input type="text" id="playerId" name="playerId" required placeholder="أدخل الرمز ID">
      </div>
      <div class="form-group">
        <label for="item">الباقة المطلوبة</label>
        <select id="item" name="item" required>
          <option value="">-- اختر الباقة --</option>
          <option value="70_diamonds">💎 70 جوهرة</option>
          <option value="140_diamonds">💎 140 جوهرة</option>
          <option value="355_diamonds">💎 355 جوهرة</option>
          <option value="720_diamonds">💎 720 جوهرة</option>
          <option value="1450_diamonds">💎 1450 جوهرة</option>
          <option value="2900_diamonds">💎 2900 جوهرة</option>
          <option value="4350_diamonds">💎 4350 جوهرة</option>
          <option value="7200_diamonds">💎 7200 جوهرة</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-shopping-cart"></i>
        إرسال الطلب
      </button>
    </form>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-content">
      <img src="/images/clan-logo.png" alt="SYRIA FOUR" class="footer-logo">
      <h3>SYRIA FOUR</h3>
      <p class="footer-desc">الموقع الرسمي ل SYRIA FOUR</p>
      <p class="footer-creator"><i class="fas fa-code"></i> منشئ الموقع: أبو أمير</p>
      <div class="footer-social" id="footerSocial"></div>
      <p class="footer-copy">&copy; 2026 SYRIA FOUR. جميع الحقوق محفوظة.</p>
    </div>
  </div>
</footer>

<div id="toastContainer" class="toast-container"></div>

<script src="/js/database.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
