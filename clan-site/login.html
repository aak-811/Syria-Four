<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYRIA FOUR | تسجيل الدخول</title>
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="loadingScreen">
  <div class="loader-content">
    <img loading="lazy" src="/images/clan-logo.png" alt="SYRIA FOUR" class="loader-logo" id="loaderLogo">
    <h2 class="loader-title">SYRIA FOUR</h2>
    <div class="loader-bar"><div class="loader-progress" id="loaderProgress"></div></div>
    <p class="loader-text">جاري التحميل...</p>
  </div>
</div>
<nav class="navbar" id="navbar">
  <div class="nav-container">
    <a href="/" class="nav-logo"><img loading="lazy" src="/images/clan-logo.png" alt="SYRIA FOUR"> SYRIA FOUR</a>
    <button class="nav-toggle" id="navToggle" aria-label="القائمة"><i class="fas fa-bars"></i></button>
    <div class="nav-menu" id="navMenu">
      <a href="/" class="nav-link">الرئيسية</a>
      <a href="/leaders" class="nav-link">القيادات</a>
      <a href="/members" class="nav-link">الأعضاء</a>
      <a href="/tournaments" class="nav-link">البطولات</a>
      <a href="/shop" class="nav-link">الشحن</a>
      <a href="/events" class="nav-link">الفعاليات</a>
      <a href="/gallery" class="nav-link">المعرض</a>
      <a href="/rules" class="nav-link">الشروط</a>
      <a href="/support" class="nav-link">الدعم</a>
    </div>
  </div>
</nav>
<div id="siteBanner" class="site-banner" style="display:none"></div>
<div class="page-header">
  <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <h1>تسجيل الدخول</h1>
  <p>مرحباً بعودتك إلى SYRIA FOUR</p>
</div>
<section class="section">
  <div class="container">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo"><img src="/images/clan-logo.png" alt="SYRIA FOUR"></div>
        <form id="loginForm" onsubmit="loginUser(event)">
          <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="loginEmail" required placeholder="your@email.com"></div>
          <div class="form-group"><label>كلمة المرور</label><input type="password" id="loginPassword" required placeholder="********"></div>
          <button type="submit" class="btn btn-primary" style="width:100%"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</button>
        </form>
        <div class="auth-divider"><span>أو</span></div>
        <div class="auth-social">
          <button class="btn btn-google" onclick="showToast('قريباً…', 'info')"><i class="fab fa-google"></i> Google</button>
          <button class="btn btn-discord" onclick="showToast('قريباً…', 'info')"><i class="fab fa-discord"></i> Discord</button>
        </div>
        <p class="auth-footer">ليس لديك حساب؟ <a href="/register">إنشاء حساب</a></p>
      </div>
    </div>
  </div>
</section>
<footer class="footer">
  <div class="container">
    <div class="footer-content">
      <img loading="lazy" src="/images/clan-logo.png" alt="SYRIA FOUR" class="footer-logo">
      <h3>SYRIA FOUR</h3>
      <p class="footer-desc">الموقع الرسمي ل SYRIA FOUR</p>
      <p class="footer-creator"><i class="fas fa-code"></i> منشئ الموقع: أبو أمير</p>
      <div class="footer-social" id="footerSocial"></div>
      <p class="footer-copy">&copy; 2026 SYRIA FOUR. جميع الحقوق محفوظة.</p>
    </div>
  </div>
</footer>
<div id="toastContainer" class="toast-container"></div>
<script defer src="/js/database.js"></script>
<script defer src="/js/auth.js"></script>
<script defer src="/js/app.js"></script>
</body>
</html>
